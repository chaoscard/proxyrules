    - 🔰 Proxy
    - 🇺🇸 US
    - 🇭🇰 HK
    - 🇯🇵 JP
    - 🇸🇬 SG
    - 🌐 ROW
    icon: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/icon/qure/color/TikTok_1.png
- select:
    name: 🎯 Direct
    policies:
    - DIRECT
    - 🔰 Proxy
    icon: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/icon/qure/color/Direct.png
- select:
    name: 🚫 Reject
    policies:
    - REJECT
    - DIRECT
    icon: https://raw.githubusercontent.com/chaoscard/proxyrules/master/ads.png
- select:
    name: ✈️ Final
    policies:
    - 🔰 Proxy
    - DIRECT
    icon: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/icon/qure/color/Final.png
- select:
    name: 🇺🇸 US
    policies:
    - sub
    flatten: true
    filter: (?i)^(美|美国|🇺🇸|US)
    icon: https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/US(2).png
- select:
    name: 🇭🇰 HK
    policies:
    - sub
    flatten: true
    filter: (?i)^(港|香港|🇭🇰|HK)
    icon: https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/Hongkong(3).png
- select:
    name: 🇯🇵 JP
    policies:
    - sub
    flatten: true
    filter: (?i)^(日|日本|🇯🇵|JP)
    icon: https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/Japan(2).png
- select:
    name: 🇸🇬 SG
    policies:
    - sub
    flatten: true
    filter: (?i)^(新|新加坡|🇸🇬|SG)
    icon: https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/singapore.png
- select:
    name: 🌐 ROW
    policies:
    - sub
    flatten: true
    filter: ^(?!.*(美|港|日|新|网|到期|时间|流量|客户端|升级)).*$
    icon: https://raw.githubusercontent.com/chaoscard/proxyrules/master/World.png

