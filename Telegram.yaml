scriptings:
- http_response:
    name: '[Telegram]t.me重定向'
    match: (https:\/\/)?t\.me\/(.+)
    script_url: https://raw.githubusercontent.com/chaoscard/proxyrules/master/t.me_redirect.js
    env:
      _compat.$argument: '{"t.me_redirect":"Telegram"}'
    timeout: 20
mitm:
  hostnames:
    includes:
    - t.me
