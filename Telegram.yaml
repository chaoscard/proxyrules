name: Telegram增强
description: 将Telegram的垃圾IP转移到好的IP上，减少转圈加载；Telegram外部链接跳转至第三方客户端
compat_arguments:
  t.me_redirect: Telegram
  PROXY: PROXY
compat_arguments_schema:
  t.me_redirect:
    name: 跳转至对应客户端
    default_value: Telegram
    options:
    - Telegram
    - Swiftgram
    - Turrit
    - iMe
    - Nicrgram
    - Lingogram
  PROXY:
    name: PROXY
    description: 代理规则使用的策略
    default_value: PROXY
open_url: https://apps.apple.com/app/id686449807
